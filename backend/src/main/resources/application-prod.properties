# Perfil de producción (Railway / hosting)
# Railway inyecta automáticamente la variable MYSQL_URL en el servicio MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Railway asigna el puerto automáticamente vía $PORT
server.port=${PORT:8083}

# CORS abierto en prod (cualquier origen — para el APK y el frontend en cualquier lado)
app.cors.allowed-origins=*
